# Publishes to npm when a GitHub Release is published, using npm
# Trusted Publishing (OIDC) — no tokens or 2FA involvement.
#
# One-time setup on npmjs.com: package page -> Settings -> Trusted Publisher
# -> GitHub Actions, with:
#   organization/user: abains
#   repository:        homebridge-kidde-ring
#   workflow filename: publish.yml
#
# Release flow: bump "version" in package.json, push, then create a GitHub
# Release with a matching tag (e.g. v0.2.0) — this workflow builds and
# publishes with provenance.

name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
